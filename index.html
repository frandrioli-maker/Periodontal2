<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Periodontal Voz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-blue-800 mb-4 text-center">Periodontograma por Voz</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <input type="text" id="dni" placeholder="DNI del Paciente" class="border p-2 rounded">
            <input type="text" id="apellido" placeholder="Apellidos" class="border p-2 rounded">
            <input type="text" id="nombre" placeholder="Nombre" class="border p-2 rounded">
        </div>

        <div class="flex justify-center gap-4 mb-6">
            <button id="btnDictar" class="bg-red-600 text-white px-6 py-3 rounded-full hover:bg-red-700 flex items-center gap-2">
                🎤 Iniciar Dictado
            </button>
            <button onclick="exportarCSV()" class="bg-green-600 text-white px-4 py-2 rounded">Exportar CSV</button>
            <button onclick="generarPDF()" class="bg-blue-600 text-white px-4 py-2 rounded">Imprimir PDF</button>
        </div>

        <div id="status" class="text-sm text-gray-500 mb-4 text-center italic">Esperando comando...</div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left border-collapse" id="tablaDatos">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="border p-1">Pieza</th>
                        <th class="border p-1">Mov.</th>
                        <th class="border p-1">Impl.</th>
                        <th class="border p-1">Margen (P/M/D)</th>
                        <th class="border p-1">Prof. (P/M/D)</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
